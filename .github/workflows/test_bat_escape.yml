name: V8 Bug Research & Auto-Verify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  v8-poc-test:
    name: Execute & Compare PoC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تثبيت d8 (V8 Shell) لتشغيل الـ JS
      - name: Install v8-d8
        run: |
          sudo apt-get update
          # تثبيت أدوات المساعدة لتشغيل محركات JS
          npm install -g jsvu
          jsvu --engines=v8
          echo "~/.jsvu/bin" >> $GITHUB_PATH

      # 2. تشغيل الـ PoC في وضعين (Jitless vs Maglev) ومقارنة النتائج
      - name: Execute PoC Comparison
        run: |
          echo "Running Baseline (Jitless)..."
          v8 --jitless poc_vuln06_trigger.js > baseline.txt
          
          echo "Running Maglev (Trigger)..."
          v8 --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "Comparing Outputs..."
          if diff baseline.txt maglev.txt; then
            echo "✅ No mismatch detected in output."
          else
            echo "❌ MISMATCH DETECTED! Potential JIT Corruption."
            diff baseline.txt maglev.txt
            exit 1
          fi

      # 3. فحص الكود بحثاً عن الـ Secrets (TruffleHog)
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          head: ${{ github.sha }}
          base: ""

      # 4. رفع التقارير في حال الفشل
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: poc-mismatch-logs
          path: |
            baseline.txt
            maglev.txt
