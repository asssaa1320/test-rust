name: Solve GhostCrypt CTF

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - name: Probe challenge homepage
        run: |
          echo "=== Fetching homepage ==="
          curl -s -L "https://ghostcrypt-2c7aa570.challenges.bsidessf.net/" \
            -o homepage.html \
            -w "HTTP %{http_code} | Size: %{size_download} bytes\n"
          cat homepage.html

      - name: Extract JS/asset links
        run: |
          echo "=== JS and asset links ==="
          grep -oP '(src|href)="[^"]*"' homepage.html | sort -u || true
          grep -oP '/[a-zA-Z0-9/_.-]+\.(js|mjs|ts|json|yaml|yml)' homepage.html | sort -u || true

      - name: Fetch all discovered JS files
        run: |
          BASE="https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          for path in $(grep -oP '(?<=(src|href)=")[^"]+' homepage.html | grep -E '\.(js|mjs)'); do
            url="$BASE$path"
            echo "=== Fetching: $url ==="
            curl -s "$url" | head -300
            echo ""
          done

      - name: Search for flag pattern in homepage
        run: |
          echo "=== Grep for CTF pattern ==="
          grep -i "CTF{" homepage.html || echo "Not found directly"
          grep -i "flag" homepage.html | head -20 || true
          grep -i "key\|secret\|token\|encrypt\|decrypt\|cipher\|xor\|aes" homepage.html | head -20 || true

      - name: Check .github/workflows exposure
        run: |
          BASE="https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          for f in deploy.yml main.yml challenge.yml build.yml ci.yml cd.yml release.yml docker.yml; do
            echo "--- /.github/workflows/$f ---"
            curl -s -o /tmp/wf.txt -w "%{http_code}" "$BASE/.github/workflows/$f"
            code=$(tail -1 /tmp/wf.txt 2>/dev/null || cat /tmp/wf.txt)
            echo "HTTP: $code"
            cat /tmp/wf.txt 2>/dev/null | head -50
            echo ""
          done

      - name: Check common sensitive paths
        run: |
          BASE="https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          for path in \
            "/.env" "/Dockerfile" "/docker-compose.yml" \
            "/robots.txt" "/sitemap.xml" \
            "/.git/config" "/.git/HEAD" \
            "/config.js" "/config.json" \
            "/api/flag" "/api/key" "/flag" \
            "/static/js/main.js" "/js/app.js" "/bundle.js" \
            "/assets/index.js" "/main.js" "/game.js"; do
            result=$(curl -s -o /tmp/r.txt -w "%{http_code}" "$BASE$path")
            if [ "$result" != "404" ] && [ "$result" != "000" ]; then
              echo "✓ [$result] $path"
              head -100 /tmp/r.txt
              echo "---"
            fi
          done

      - name: Deep scan JS for crypto artifacts
        run: |
          BASE="https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          # Try Vite/React build patterns
          for path in \
            "/assets/index.js" "/assets/main.js" \
            "/static/js/main.chunk.js" "/static/js/bundle.js" \
            "/dist/bundle.js" "/dist/main.js" \
            "/_next/static/chunks/main.js" \
            "/js/game.js" "/js/main.js"; do
            result=$(curl -s -o /tmp/js.txt -w "%{http_code}" "$BASE$path")
            if [ "$result" = "200" ]; then
              echo "=== FOUND: $path ==="
              # Search for flag or key patterns
              grep -oP 'CTF\{[^}]+\}' /tmp/js.txt || true
              grep -oP '[a-f0-9]{32,64}' /tmp/js.txt | head -10 || true
              grep -i "flag\|key\|secret\|password" /tmp/js.txt | head -20 || true
            fi
          done

      - name: Try WebSocket connection
        run: |
          pip install websocket-client -q
          python3 - <<'EOF'
          import websocket, json, time, threading

          BASE = "ghostcrypt-2c7aa570.challenges.bsidessf.net"
          results = []

          def on_message(ws, msg):
              print(f"WS MSG: {msg}")
              results.append(msg)

          def on_error(ws, err):
              print(f"WS ERR: {err}")

          def on_open(ws):
              print("WS CONNECTED")
              # Try common game messages
              for payload in [
                  '{"type":"init"}',
                  '{"action":"start"}', 
                  '{"cmd":"flag"}',
                  '{"score":999999}',
                  '{}',
              ]:
                  try:
                      ws.send(payload)
                      time.sleep(0.5)
                  except:
                      pass

          for scheme in ["wss", "ws"]:
              for path in ["/ws", "/game", "/socket", "/", "/api/ws"]:
                  url = f"{scheme}://{BASE}{path}"
                  print(f"Trying: {url}")
                  try:
                      ws = websocket.WebSocketApp(
                          url,
                          on_message=on_message,
                          on_error=on_error,
                          on_open=on_open
                      )
                      t = threading.Thread(target=ws.run_forever, kwargs={"ping_timeout": 3})
                      t.daemon = True
                      t.start()
                      t.join(timeout=5)
                      if results:
                          print("GOT RESULTS:", results)
                          break
                  except Exception as e:
                      print(f"  Error: {e}")
          EOF

      - name: Fetch full homepage JS and grep everything
        run: |
          BASE="https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          # Get all script src tags and fetch them
          curl -s "$BASE/" > /tmp/index.html
          echo "=== Full HTML ===" 
          cat /tmp/index.html
          
          # Extract all script sources
          python3 - <<'EOF'
          import re, urllib.request, sys

          with open('/tmp/index.html') as f:
              html = f.read()

          base = "https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          
          # Find all JS files referenced
          scripts = re.findall(r'src=["\']([^"\']+\.js[^"\']*)["\']', html)
          scripts += re.findall(r'"(/[^"]+\.js)"', html)
          scripts += re.findall(r"'(/[^']+\.js)'", html)
          
          print(f"Found {len(scripts)} scripts: {scripts}")
          
          for src in set(scripts):
              url = src if src.startswith('http') else base + src
              print(f"\n=== {url} ===")
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  resp = urllib.request.urlopen(req, timeout=10)
                  content = resp.read().decode('utf-8', errors='replace')
                  
                  # Search for flag
                  flags = re.findall(r'CTF\{[^}]+\}', content)
                  if flags:
                      print(f"🚩 FLAG FOUND: {flags}")
                  
                  # Search for hex keys
                  keys = re.findall(r'[0-9a-fA-F]{32,}', content)
                  if keys:
                      print(f"Keys/hashes: {keys[:5]}")
                  
                  # Search for interesting strings
                  for pattern in ['flag', 'key', 'secret', 'encrypt', 'decrypt', 'xor', 'aes', 'cipher']:
                      matches = re.findall(f'.{{0,50}}{pattern}.{{0,50}}', content, re.IGNORECASE)
                      if matches:
                          print(f"  [{pattern}]: {matches[:3]}")
                          
              except Exception as e:
                  print(f"Error: {e}")
          EOF
