name: V8 Bug Research & Auto-Verify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  v8-poc-test:
    name: Execute & Compare PoC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # تثبيت v8 بشكل غير تفاعلي باستخدام jsvu
      - name: Install v8 (d8)
        run: |
          npm install -g jsvu
          # تمرير الإعدادات لـ jsvu مسبقاً لتجنب الأسئلة التفاعلية
          echo '{"os": "linux64", "engines": ["v8"], "prefix": "~/.jsvu"}' > ~/.jsvukrc
          jsvu --engine=v8
          echo "$HOME/.jsvu/bin" >> $GITHUB_PATH

      # تشغيل الـ PoC ومقارنة النتائج
      - name: Execute PoC Comparison
        run: |
          # التأكد من وجود المحرك
          v8-debug --version || v8 --version
          
          echo "Running Baseline (Jitless)..."
          v8 --jitless poc_vuln06_trigger.js > baseline.txt
          
          echo "Running Maglev (Trigger)..."
          # استخدمنا --maglev و --maglev-filter لتوجيه المحرك للثغرة مباشرة
          v8 --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "Comparing Outputs..."
          if diff baseline.txt maglev.txt; then
            echo "✅ No mismatch detected."
          else
            echo "❌ MISMATCH DETECTED!"
            diff baseline.txt maglev.txt
            exit 1
          fi

      # رفع الملفات الناتجة حتى لو فشل الاختبار لمراجعتها
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-execution-logs
          path: |
            baseline.txt
            maglev.txt
