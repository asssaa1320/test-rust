name: V8 Bug Research & Auto-Verify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  v8-poc-test:
    name: Execute & Compare PoC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تحميل v8 (d8) مباشرة من Google Storage (أسرع وأضمن)
      - name: Install v8 (d8)
        run: |
          # تحميل أحدث نسخة مستقرة من d8 لنظام لينكس
          curl -fLO https://storage.googleapis.com/chromium-v8/built-ins/x64.release/d8.zip
          sudo apt-get install -y unzip
          unzip d8.zip -d v8_bin
          # إضافة المجلد للمسار
          echo "$(pwd)/v8_bin" >> $GITHUB_PATH
          # إعطاء صلاحيات التنفيذ
          chmod +x v8_bin/d8

      # 2. تشغيل الـ PoC ومقارنة النتائج
      - name: Execute PoC Comparison
        run: |
          # التأكد من أن d8 متاح
          export PATH="$(pwd)/v8_bin:$PATH"
          
          if ! command -v d8 &> /dev/null; then
            echo "Error: d8 (v8) not found even after direct install"
            exit 1
          fi

          echo "Running Baseline (Jitless)..."
          d8 --jitless poc_vuln06_trigger.js > baseline.txt
          
          echo "Running Maglev (Trigger)..."
          # استخدام d8 بدلاً من v8 وتمرير flags الـ Maglev
          d8 --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "Comparing Outputs..."
          if diff baseline.txt maglev.txt; then
            echo "✅ No mismatch detected."
          else
            echo "❌ MISMATCH DETECTED! JIT Logic Error Confirmed."
            diff baseline.txt maglev.txt
            exit 1
          fi

      # 3. رفع التقارير
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-execution-logs
          path: |
            baseline.txt
            maglev.txt
