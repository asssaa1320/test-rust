name: Solve Kitty - Download Full Image

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - name: Download full flag.kitty and decode image
        run: |
          pip install pillow --break-system-packages -q

          python3 - <<'EOF'
          import socket, time, base64, zlib, re

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          s = socket.create_connection((host, port), timeout=30)
          s.settimeout(5)
          time.sleep(2)
          try: s.recv(4096)
          except: pass

          def send_recv(cmd, wait=3.0):
              if isinstance(cmd, str): cmd = cmd.encode()
              s.sendall(cmd)
              time.sleep(wait)
              out = b''
              s.settimeout(3)
              try:
                  while True:
                      chunk = s.recv(65536)
                      if not chunk: break
                      out += chunk
              except: pass
              return out

          # Get the full file via base64
          print("=== Getting file size ===")
          out = send_recv('wc -c /home/ctf/flag.kitty\n')
          print(out.decode('utf-8', errors='replace'))

          print("=== Encoding full file as base64 ===")
          # Use base64 to dump the entire binary file
          out = send_recv('base64 /home/ctf/flag.kitty\n', wait=10)
          raw_out = out.decode('utf-8', errors='replace')
          
          # Extract base64 data (remove prompt lines)
          lines = raw_out.split('\n')
          b64_lines = []
          for line in lines:
              line = line.strip()
              # Skip shell prompt lines and command echo
              if line and not line.startswith('ctf@') and not line.startswith('base64') and not line.startswith('$'):
                  # Remove ANSI escape codes
                  line = re.sub(r'\x1b\[[^m]*m', '', line)
                  line = re.sub(r'\x1b\[[^A-Za-z]*[A-Za-z]', '', line)
                  line = line.strip()
                  if line and all(c in 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=' for c in line):
                      b64_lines.append(line)

          b64_data = ''.join(b64_lines)
          print(f"Got {len(b64_data)} base64 chars")
          
          # Decode
          try:
              raw_bytes = base64.b64decode(b64_data + '==')
              print(f"Decoded: {len(raw_bytes)} bytes")
              
              with open('/tmp/flag.kitty', 'wb') as f:
                  f.write(raw_bytes)
              print("Saved raw file")
          except Exception as e:
              print(f"Base64 decode error: {e}")
              # Save raw output for analysis
              with open('/tmp/flag_raw_output.txt', 'w') as f:
                  f.write(raw_out)

          s.close()
          EOF

      - name: Parse Kitty Graphics Protocol and extract image
        run: |
          python3 - <<'EOF'
          import base64, zlib, re, os

          # Read the raw file
          try:
              with open('/tmp/flag.kitty', 'rb') as f:
                  data = f.read()
              print(f"File size: {len(data)} bytes")
          except:
              print("flag.kitty not found, trying raw output...")
              with open('/tmp/flag_raw_output.txt') as f:
                  data = f.read().encode()

          # Kitty graphics protocol: ESC_G<params>;<data>ESC\
          # Look for APC sequences: \x1b_G...\x1b\\ or just parse the params;data pattern
          
          # The file format from cat output:
          # _Ga=T,q=2,f=24,o=z,m=1,s=800,v=427;<b64data>
          # Then more chunks: _Gm=0;<b64data>  (m=0 = last chunk)
          
          # Extract all chunks
          text = data.decode('utf-8', errors='replace') if isinstance(data, bytes) else data
          
          # Pattern: _G<params>;<base64>
          chunks = re.findall(r'_G([^;]+);([A-Za-z0-9+/=]+)', text)
          print(f"Found {len(chunks)} chunks")
          
          if not chunks:
              # Try raw bytes pattern
              chunks = re.findall(rb'_G([^;]+);([A-Za-z0-9+/=]+)', data)
              print(f"Found {len(chunks)} byte chunks")
          
          all_b64 = ''
          width = height = fmt = 0
          
          for params_raw, b64 in chunks[:5]:
              if isinstance(params_raw, bytes):
                  params_raw = params_raw.decode()
                  b64 = b64.decode()
              params = dict(p.split('=') for p in params_raw.split(',') if '=' in p)
              print(f"  Chunk params: {params}, b64_len={len(b64)}")
              all_b64 += b64
              if 's' in params: width = int(params['s'])
              if 'v' in params: height = int(params['v'])
              if 'f' in params: fmt = int(params['f'])

          print(f"\nImage: {width}x{height} fmt={fmt}")
          print(f"Total b64 data: {len(all_b64)} chars")

          # Try to decompress
          try:
              raw_img = base64.b64decode(all_b64 + '==')
              print(f"Decoded: {len(raw_img)} bytes")
              img_data = zlib.decompress(raw_img)
              print(f"Decompressed: {len(img_data)} bytes")
              
              from PIL import Image
              mode = 'RGB' if fmt == 24 else 'RGBA'
              bpp = 3 if fmt == 24 else 4
              img = Image.frombytes(mode, (width, height), img_data[:width*height*bpp])
              img.save('/tmp/flag_image.png')
              print("Saved: /tmp/flag_image.png")
          except Exception as e:
              print(f"Image decode error: {e}")
              import traceback; traceback.print_exc()
          EOF

      - name: Upload decoded image
        uses: actions/upload-artifact@v4
        with:
          name: flag-image
          path: /tmp/flag_image.png
          if-no-files-found: warn
