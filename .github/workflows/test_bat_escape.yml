name: V8 & Blink Security Lab (Auto-Execution)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-research:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. إعداد بيئة V8
      - name: Install V8 (d8) via jsvu
        run: |
          npm install -g jsvu
          jsvu --os=linux64 --engines=v8
          echo "$HOME/.jsvu/bin" >> $GITHUB_PATH

      # 2. إنشاء ملف الـ PoC تلقائياً
      - name: Create PoC File
        run: |
          cat << 'EOF' > poc_vuln06_trigger.js
          // محتوى الـ PoC الخاص بـ FoldBranch()
          "use strict";
          function foldedBranchPhi(n) {
            let sum = 0;
            for (let i = 0; i < n; i++) {
              const x = i | 0;
              const alwaysInt = (x | 0) === x;
              let val;
              if (alwaysInt) { val = x * 2; } else { val = -999; }
              sum += val;
            }
            return sum;
          }
          const N = 500;
          const t1 = foldedBranchPhi(N);
          const t1_expected = N * (N - 1);
          if (t1 !== t1_expected) {
            console.log("MISMATCH t1: got=" + t1 + " expected=" + t1_expected);
          } else {
            console.log("ok t1=" + t1);
          }
          EOF

      # 3. إنشاء ملف الـ Fuzzer تلقائياً
      - name: Create Fuzzer File
        run: |
          cat << 'EOF' > go.py
          import os
          import random
          # نسخة مبسطة من الفازر للتشغيل السريع داخل الـ CI
          def generate_sample(seed):
              return f"<html><body><h1>Fuzz Seed {seed}</h1></body></html>"
          
          os.makedirs("./fuzz_results/html", exist_ok=True)
          for i in range(10):
              with open(f"./fuzz_results/html/fuzz_{i}.html", "w") as f:
                  f.write(generate_sample(i))
          print("Generated 10 samples for testing.")
          EOF

      # 4. تشغيل الاختبارات والمقارنة
      - name: Run V8 Tests
        run: |
          export PATH="$HOME/.jsvu/bin:$PATH"
          echo "Running Baseline (Jitless)..."
          v8 --jitless poc_vuln06_trigger.js > baseline.txt
          echo "Running Maglev (Trigger)..."
          v8 --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "--- Results ---"
          diff baseline.txt maglev.txt || echo "❌ Mismatch Found!"

      # 5. تشغيل الـ Fuzzer (Dry-run)
      - name: Run Fuzzer (Python)
        run: python3 go.py

      # 6. حفظ كل شيء كـ Artifact
      - name: Archive All
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-bundle
          path: |
            baseline.txt
            maglev.txt
            fuzz_results/
