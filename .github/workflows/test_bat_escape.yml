name: Solve GhostCrypt - Fixed Lookup

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    steps:
      - name: Crack with fixed case-sensitive lookup
        run: |
          python3 - <<'EOF'
          import urllib.request, json, urllib.parse
          from itertools import product as iproduct

          BASE  = "https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          alpha = 'abcdefghijklmnopqrstuvwxyz'
          freq  = {'e':12.7,'t':9.1,'a':8.2,'o':7.5,'i':7.0,'n':6.7,'s':6.3,
                   'h':6.1,'r':6.0,'d':4.3,'l':4.0,'c':2.8,'u':2.8,'m':2.4,
                   'w':2.4,'f':2.2,'g':2.0,'y':2.0,'p':1.9,'b':1.5}

          def invoke(inc, arc):
              data = urllib.parse.urlencode({'incantation':inc,'arcana':arc}).encode()
              req  = urllib.request.Request(BASE+"/invoke", data=data,
                        headers={'Content-Type':'application/x-www-form-urlencoded'})
              d = json.loads(urllib.request.urlopen(req, timeout=10).read())
              return ''.join(c for c in d.get('playback_sequence',[]) if c!=' ').upper()

          def litany():
              req = urllib.request.Request(BASE+"/summon-litany", data=b'',
                        headers={'Content-Type':'application/x-www-form-urlencoded'})
              d = json.loads(urllib.request.urlopen(req, timeout=10).read())
              return ''.join(c for c in d.get('playback_sequence',[]) if c!=' ').upper()

          # Build E and D tables (all lowercase internally)
          print("Building cipher tables...")
          E = {}   # E[key_char][plain_lower] = cipher_lower
          D = {}   # D[key_char][cipher_lower] = plain_lower
          for k in alpha:
              row = invoke(alpha, k).lower()   # 26 chars, lowercase output
              E[k] = dict(zip(alpha, row))
              D[k] = {c:p for p,c in E[k].items()}

          cipher = litany()
          print(f"Cipher: {cipher}")

          # Brute force key (length 3 per Kasiski)
          best = []
          for combo in iproduct(alpha, repeat=3):
              key = ''.join(combo)
              pt  = ''.join(D[key[i%3]].get(cipher[i].lower(), '?')
                            for i in range(len(cipher)))
              if '?' in pt:
                  continue
              s = sum(freq.get(c, 0.1) for c in pt)
              best.append((s, key, pt))

          best.sort(reverse=True)
          print("\nTop 20:")
          for s, k, pt in best[:20]:
              print(f"  key={k}  score={s:.1f}  →  {pt}")

          # Verify per-char via oracle
          print("\nVerifying top candidates per-char...")
          for s, key, pt in best[:30]:
              ok = all(invoke(pt[i], key[i%3]).upper() == cipher[i].upper()
                       for i in range(len(cipher)))
              print(f"  key={key}  pt={pt}  match={ok}")
              if ok:
                  print(f"\n  🚩 FLAG: CTF{{{pt}}}")
                  break
          EOF
