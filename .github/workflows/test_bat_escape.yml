name: Solve GhostCrypt - Per-Char Verification

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    steps:
      - name: Verify per-char + find flag
        run: |
          python3 - <<'EOF'
          import urllib.request, json, urllib.parse

          BASE  = "https://ghostcrypt-2c7aa570.challenges.bsidessf.net"
          alpha = 'abcdefghijklmnopqrstuvwxyz'

          def invoke(inc, arc):
              data = urllib.parse.urlencode({'incantation':inc,'arcana':arc}).encode()
              req  = urllib.request.Request(BASE+"/invoke", data=data,
                        headers={'Content-Type':'application/x-www-form-urlencoded'})
              d = json.loads(urllib.request.urlopen(req, timeout=10).read())
              return ''.join(c for c in d.get('playback_sequence',[]) if c!=' ').upper()

          def litany():
              req = urllib.request.Request(BASE+"/summon-litany", data=b'',
                        headers={'Content-Type':'application/x-www-form-urlencoded'})
              d = json.loads(urllib.request.urlopen(req, timeout=10).read())
              return ''.join(c for c in d.get('playback_sequence',[]) if c!=' ').upper()

          # ── Build full E table: E[k][p] = c (single-char key) ─────────
          print("Building E table for all 26 key chars...")
          E = {}
          for k in alpha:
              row = invoke(alpha, k)
              E[k] = dict(zip(alpha, row.lower().replace('j','j')))

          # Build D (decrypt): D[k][c] = p
          D = {}
          for k in alpha:
              D[k] = {c:p for p,c in E[k].items()}

          # ── Get fresh cipher ───────────────────────────────────────────
          cipher = litany()
          print(f"Cipher: {cipher}")

          # ── Brute force all 3-char keys using per-char D table ────────
          from itertools import product as iproduct
          freq = {'e':12.7,'t':9.1,'a':8.2,'o':7.5,'i':7.0,'n':6.7,'s':6.3,
                  'h':6.1,'r':6.0,'d':4.3,'l':4.0,'c':2.8,'u':2.8,'m':2.4,
                  'w':2.4,'f':2.2,'g':2.0,'y':2.0,'p':1.9,'b':1.5}

          best = []
          for klen in [3]:   # Kasiski = 3
              for combo in iproduct(alpha, repeat=klen):
                  key = ''.join(combo)
                  pt_chars = []
                  for i, ch in enumerate(cipher):
                      k = key[i % klen]
                      p = D[k].get(ch.upper(), D[k].get(ch))
                      if p is None:
                          # try lowercase lookup
                          p = D[k].get(ch.lower().upper())
                      pt_chars.append(p or '?')
                  pt = ''.join(pt_chars)
                  s  = sum(freq.get(c,0.1) for c in pt)
                  best.append((s, key, pt))

          best.sort(reverse=True)
          print("\nTop 10 candidates:")
          for s, k, pt in best[:10]:
              print(f"  key={k}  score={s:.1f}  →  {pt}")

          # ── Verify per-char: invoke each plain with its key char ──────
          # For key K and plaintext P:
          # cipher[i] should == invoke(P[i], K[i%klen]).upper()
          print("\nVerifying top candidates (per-char)...")
          for s, key, pt in best[:20]:
              klen  = len(key)
              match = True
              for i, (pi, ci) in enumerate(zip(pt, cipher)):
                  k    = key[i % klen]
                  out  = invoke(pi, k)     # single char invocation
                  if out.upper() != ci.upper():
                      match = False
                      break
              print(f"  key={key}  pt={pt}  match={match}")
              if match:
                  print(f"\n  🚩 FLAG: CTF{{{pt}}}")
                  break
          EOF
