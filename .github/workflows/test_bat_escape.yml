name: Solve GhostCrypt - Deep Oracle

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    steps:

      - name: Deep oracle analysis + crack
        run: |
          python3 - <<'EOF'
          import urllib.request, json, urllib.parse

          BASE = "https://ghostcrypt-2c7aa570.challenges.bsidessf.net"

          def invoke(incantation, arcana):
              data = urllib.parse.urlencode({
                  'incantation': incantation,
                  'arcana': arcana
              }).encode()
              req = urllib.request.Request(
                  BASE + "/invoke", data=data,
                  headers={'Content-Type': 'application/x-www-form-urlencoded'}
              )
              resp = urllib.request.urlopen(req, timeout=10)
              d = json.loads(resp.read())
              seq = d.get('playback_sequence', [])
              return ''.join(c for c in seq if c != ' ').upper()

          def litany():
              req = urllib.request.Request(BASE + "/summon-litany",
                  data=b'', headers={'Content-Type': 'application/x-www-form-urlencoded'})
              resp = urllib.request.urlopen(req, timeout=10)
              d = json.loads(resp.read())
              seq = d.get('playback_sequence', [])
              return ''.join(c for c in seq if c != ' ').upper()

          # ── Oracle: map the full 26x26 cipher table for each key-char ────
          print("=== Building cipher table ===")
          # For key='a' (=0), test all 26 plaintexts
          alpha = 'abcdefghijklmnopqrstuvwxyz'
          
          # Single char key tests
          r_a = invoke(alpha, 'a')   # encrypt all letters with key='a'
          r_b = invoke(alpha, 'b')   # encrypt all letters with key='b'  
          r_c = invoke(alpha, 'c')   # encrypt all letters with key='c'
          
          print(f"invoke(alpha, 'a') = {r_a}")
          print(f"invoke(alpha, 'b') = {r_b}")
          print(f"invoke(alpha, 'c') = {r_c}")
          
          # Build decrypt tables: decrypt[key_char][cipher_char] = plain_char
          # encrypt[k][p] = c  →  decrypt[k][c] = p
          dec_table = {}
          for ki, (k, row) in enumerate(zip('abc', [r_a, r_b, r_c])):
              dec_table[ki] = {}
              for pi, ci in enumerate(row):
                  dec_table[ki][ci] = alpha[pi]
          
          print("\nDecrypt table sample (key_idx → cipher → plain):")
          for ki in range(3):
              sample = {c: dec_table[ki][c] for c in list(dec_table[ki])[:5]}
              print(f"  key[{ki}]: {sample}")

          # ── Get fresh cipher ───────────────────────────────────────────
          cipher = litany()
          print(f"\nFresh cipher: {cipher}")

          # ── Kasiski to find key length ─────────────────────────────────
          from math import gcd
          from functools import reduce
          
          def kasiski(ct):
              distances = []
              for plen in range(2, 6):
                  for i in range(len(ct) - plen):
                      pat = ct[i:i+plen]
                      for j in range(i+plen, len(ct)-plen+1):
                          if ct[j:j+plen] == pat:
                              distances.append(j - i)
              return reduce(gcd, distances) if distances else 3
          
          klen = kasiski(cipher)
          print(f"Kasiski key length: {klen}")

          # ── Build full decrypt table for all key positions ─────────────
          # We need decrypt tables for key chars at each position mod klen
          # First: find what key char maps at each position
          # 
          # Strategy: for each position i in cipher,
          # key_char = key[i % klen]
          # We need to find what key_char is by trying all 26 possibilities
          #
          # Use invoke to test: if we encrypt known plaintext with the SECRET key,
          # we can identify the key.
          #
          # BUT invoke uses USER arcana, not secret arcana!
          # 
          # REAL APPROACH: build full lookup table for every possible key char
          # For each key position, try all 26 possible key chars
          # For each cipher char, find which key char produces a "likely" plaintext
          
          # Build complete decrypt table for all 26 key chars
          print("\nBuilding complete decrypt table for all 26 key chars...")
          full_dec = {}  # full_dec[key_char_idx][cipher_char] = plain_char
          
          # We already have key=a,b,c. Need all 26.
          # Batch: test key=d through z
          remaining_keys = 'defghijklmnopqrstuvwxyz'
          results = {}
          results['a'] = r_a
          results['b'] = r_b
          results['c'] = r_c
          
          for k in remaining_keys:
              results[k] = invoke(alpha, k)
          
          # Build decrypt table
          for k, row in results.items():
              ki = ord(k) - ord('a')
              full_dec[ki] = {}
              for pi, ci in enumerate(row.upper()):
                  full_dec[ki][ci] = alpha[pi]
          
          print("Complete decrypt table built!")
          
          # ── Brute force key ────────────────────────────────────────────
          from itertools import product
          
          freq = {'e':12.7,'t':9.1,'a':8.2,'o':7.5,'i':7.0,'n':6.7,'s':6.3,
                  'h':6.1,'r':6.0,'d':4.3,'l':4.0,'c':2.8,'u':2.8,'m':2.4,
                  'w':2.4,'f':2.2,'g':2.0,'y':2.0,'p':1.9,'b':1.5}
          
          def decrypt_with_key(cipher, key_indices):
              result = []
              for i, ch in enumerate(cipher):
                  ki = key_indices[i % len(key_indices)]
                  plain = full_dec[ki].get(ch, '?')
                  result.append(plain)
              return ''.join(result)
          
          def score(pt):
              return sum(freq.get(c, 0.1) for c in pt)
          
          best = []
          for combo in product(range(26), repeat=klen):
              pt = decrypt_with_key(cipher, combo)
              s = score(pt)
              best.append((s, combo, pt))
          
          best.sort(reverse=True)
          
          print(f"\nTop 10 decryptions:")
          for s, combo, pt in best[:10]:
              key_str = ''.join(chr(k + ord('a')) for k in combo)
              print(f"  key={key_str} score={s:.1f} → {pt}")
          
          top_pt = best[0][2]
          top_key = ''.join(chr(k + ord('a')) for k in best[0][1])
          
          # ── Verify via invoke oracle ───────────────────────────────────
          print(f"\nVerifying: invoke('{top_pt}', '{top_key}') should == '{cipher}'")
          verification = invoke(top_pt, top_key)
          print(f"Got: {verification}")
          print(f"Match: {verification == cipher}")
          
          if verification == cipher:
              print(f"\n🚩 FLAG: CTF{{{top_pt}}}")
          else:
              # Try top 20
              print("\nTrying top 20 candidates...")
              for s, combo, pt in best[1:20]:
                  key_str = ''.join(chr(k + ord('a')) for k in combo)
                  v = invoke(pt, key_str)
                  if v == cipher:
                      print(f"🚩 FLAG: CTF{{{pt}}}")
                      break
                  print(f"  key={key_str} → {pt} | match={v==cipher}")
          EOF
