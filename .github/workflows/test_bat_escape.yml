name: Autonomous Security & Testing Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # يسمح لك بتشغيل الورك فلو يدوياً في أي وقت
  workflow_dispatch: 

jobs:
  # المرحلة الأولى: فحص أمن الكود والبيانات الحساسة
  static_analysis:
    name: Code & Secret Auditing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Python Security Audit (Bandit)
        run: |
          pip install bandit
          bandit -r . -ll -ii -f txt -o bandit_report.txt || true

      - name: Archive Static Reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: bandit_report.txt

  # المرحلة الثانية: التشغيل الآلي والاختبار (Dynamic Execution)
  dynamic_testing:
    name: Autonomous Execution Test
    needs: static_analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      # هنا نقوم بتشغيل "Vortex" أو أي أداة لديك بشكل تجريبي
      - name: Run Tool Sanity Check (Smoke Test)
        run: |
          # محاكاة تشغيل الأداة لمدة زمنية قصيرة للتأكد من عدم وجود Crash
          timeout 60s python3 main.py --scan-local || echo "Initial test completed"

      - name: Run Automated Unit Tests
        run: |
          # تشغيل اختبارات الكود التلقائية مع تقرير التغطية
          pytest --cov=./ --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # المرحلة الثالثة: التنبيه في حال وجود مشاكل
  notify:
    name: Reporting & Alerts
    needs: [static_analysis, dynamic_testing]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Failure
        run: |
          echo "Critical failure detected in the security pipeline."
          # هنا يمكنك ربطها بـ Telegram Bot أو Discord Webhook إذا أردت
