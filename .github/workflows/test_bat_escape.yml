name: V8 Bug Research & Auto-Verify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  v8-poc-test:
    name: Execute & Compare PoC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تثبيت jsvu وتشغيلها بطريقة إجبارية (Force)
      - name: Install v8 via jsvu (Non-Interactive)
        run: |
          npm install -g jsvu
          # إرسال الاختيارات يدوياً (الخيار 3 عادة هو Linux 64-bit)
          # ثم تحديد محرك v8 فقط
          echo "3
          v8" | jsvu
          
          # إضافة المسار للمستقبل
          echo "$HOME/.jsvu/bin" >> $GITHUB_PATH

      # 2. تشغيل الـ PoC ومقارنة النتائج
      - name: Execute PoC Comparison
        run: |
          # التأكد من المسار محلياً للخطوة الحالية
          export PATH="$HOME/.jsvu/bin:$PATH"
          
          # jsvu تنزل الملف باسم v8 أو v8-debug
          V8_EXEC=$(command -v v8 || command -v v8-debug)
          
          if [ -z "$V8_EXEC" ]; then
            echo "Error: V8 engine not found. Checking directory content:"
            ls -R $HOME/.jsvu/bin || echo "Bin folder empty"
            exit 1
          fi

          echo "Using V8 from: $V8_EXEC"

          echo "Running Baseline (Jitless)..."
          $V8_EXEC --jitless poc_vuln06_trigger.js > baseline.txt
          
          echo "Running Maglev (Trigger)..."
          $V8_EXEC --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "Comparing Outputs..."
          if diff baseline.txt maglev.txt; then
            echo "✅ No mismatch detected."
          else
            echo "❌ MISMATCH DETECTED! JIT Logic Error Confirmed."
            diff baseline.txt maglev.txt
            exit 1
          fi

      # 3. رفع التقارير
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-execution-logs
          path: |
            baseline.txt
            maglev.txt
