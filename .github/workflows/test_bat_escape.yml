name: Security Bug Verification

on:
  push:
  workflow_dispatch:

jobs:
  verify-bugs:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup test module
        run: |
          mkdir -p ~/hiero-test
          cd ~/hiero-test
          go mod init hiero-security-test
          go get github.com/hiero-ledger/hiero-sdk-go/v2@latest
          go mod tidy

      - name: Bug 2 - ClientFromConfigWithoutScheduleNetworkUpdate NPE
        run: |
          mkdir -p ~/hiero-test/bug2
          cat > ~/hiero-test/bug2/main_test.go << 'EOF'
package bug2_test

import (
	"testing"

	hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
)

func TestBug2_NilPointerPanic(t *testing.T) {
	defer func() {
		if r := recover(); r != nil {
			t.Logf("BUG CONFIRMED — panic: %v", r)
		} else {
			t.Log("No panic — possibly fixed")
		}
	}()
	badJSON := []byte(`{"network":"mainnet","mirrorNetwork":123}`)
	client, err := hiero.ClientFromConfigWithoutScheduleNetworkUpdate(badJSON)
	t.Logf("client=%v err=%v", client, err)
}
EOF
          cd ~/hiero-test && go mod tidy && go test ./bug2/ -v -run TestBug2

      - name: Bug 1 - SetNetworkUpdatePeriod(0) goroutine spike
        run: |
          mkdir -p ~/hiero-test/bug1
          cat > ~/hiero-test/bug1/main_test.go << 'EOF'
package bug1_test

import (
	"runtime"
	"testing"
	"time"

	hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
)

func TestBug1_ZeroPeriodLoop(t *testing.T) {
	client := hiero.ClientForTestnet()
	defer client.Close()

	before := runtime.NumGoroutine()
	client.SetNetworkUpdatePeriod(0)
	time.Sleep(500 * time.Millisecond)
	after := runtime.NumGoroutine()

	t.Logf("Goroutines before: %d", before)
	t.Logf("Goroutines after:  %d", after)
	t.Logf("Delta: +%d", after-before)

	if after > before+5 {
		t.Logf("BUG CONFIRMED — goroutine spike detected: +%d", after-before)
	} else {
		t.Log("No goroutine spike — check CPU usage manually")
	}
}
EOF
          cd ~/hiero-test && go mod tidy && timeout 10 go test ./bug1/ -v -run TestBug1 -timeout 8s || echo "TIMEOUT — likely infinite loop confirmed"

      - name: Bug 3 - defer UpdateAddressBook inside retry loop
        run: |
          mkdir -p ~/hiero-test/bug3
          cat > ~/hiero-test/bug3/main_test.go << 'EOF'
package bug3_test

import (
	"testing"

	hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
)

func TestBug3_DeferInLoop(t *testing.T) {
	client := hiero.ClientForTestnet()
	defer client.Close()

	_, err := hiero.NewAccountBalanceQuery().
		SetAccountID(hiero.AccountID{Account: 999999999}).
		SetNodeAccountIDs([]hiero.AccountID{{Account: 99}}).
		SetMaxRetry(3).
		Execute(client)

	t.Logf("Result err: %v", err)
	t.Log("Manual check: count UpdateAddressBook calls during _Execute — expected 3 deferred calls at end")
}
EOF
          cd ~/hiero-test && go mod tidy && go test ./bug3/ -v -run TestBug3 -timeout 30s

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          echo "Security Bug Verification Summary"
          echo "========================================"
          echo "Bug 1: SetNetworkUpdatePeriod(0) → goroutine infinite loop"
          echo "Bug 2: ClientFromConfigWithoutScheduleNetworkUpdate → nil pointer panic"
          echo "Bug 3: defer _UpdateAddressBook() inside retry loop → N deferred calls"
          echo "========================================"
