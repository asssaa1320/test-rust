name: Security Bug Verification

on:
  push:
  workflow_dispatch:

jobs:
  verify-bugs:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup test module
        run: |
          mkdir -p ~/hiero-test
          cd ~/hiero-test
          go mod init hiero-security-test
          go get github.com/hiero-ledger/hiero-sdk-go/v2@latest
          go mod tidy

      - name: Bug 2 - NPE in ClientFromConfigWithoutScheduleNetworkUpdate
        run: |
          mkdir -p ~/hiero-test/bug2
          echo "" | base64 -d > ~/hiero-test/bug2/main_test.go
          cd ~/hiero-test && go mod tidy
          go test ./bug2/ -v -run TestBug2

      - name: Bug 1 - SetNetworkUpdatePeriod(0) goroutine spike
        run: |
          mkdir -p ~/hiero-test/bug1
          echo "" | base64 -d > ~/hiero-test/bug1/main_test.go
          cd ~/hiero-test && go mod tidy
          timeout 10 go test ./bug1/ -v -run TestBug1 -timeout 8s || echo "TIMEOUT — infinite loop likely"

      - name: Bug 3 - defer UpdateAddressBook inside retry loop
        run: |
          mkdir -p ~/hiero-test/bug3
          echo "" | base64 -d > ~/hiero-test/bug3/main_test.go
          cd ~/hiero-test && go mod tidy
          go test ./bug3/ -v -run TestBug3 -timeout 30s

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          echo "Bug 1: SetNetworkUpdatePeriod(0) infinite goroutine loop"
          echo "Bug 2: ClientFromConfigWithoutScheduleNetworkUpdate nil pointer panic"
          echo "Bug 3: defer UpdateAddressBook inside retry loop - N deferred calls"
          echo "========================================"
