name: Solve GhostCrypt - Get Flag

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  get-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Call /summon-litany and extract flag
        run: |
          echo "=== Calling POST /summon-litany ==="
          curl -s -X POST \
            "https://ghostcrypt-2c7aa570.challenges.bsidessf.net/summon-litany" \
            -H "Content-Type: application/json" \
            > /tmp/litany.json

          echo "=== Raw response ==="
          cat /tmp/litany.json

          echo ""
          echo "=== Extracting playback_sequence ==="
          python3 - <<'EOF'
          import json

          with open('/tmp/litany.json') as f:
              data = json.load(f)

          print("Full response:", json.dumps(data, indent=2))

          seq = data.get('playback_sequence', [])
          # Join letters, skip spaces
          litany = ''.join(c for c in seq if c != ' ')
          flag = f"CTF{{{litany}}}"

          print(f"\n🚩 FLAG: {flag}")
          EOF
