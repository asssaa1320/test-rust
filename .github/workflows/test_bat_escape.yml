name: V8 Bug Research & Auto-Verify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  v8-poc-test:
    name: Execute & Compare PoC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تثبيت v8 بشكل صامت تماماً
      - name: Install v8 (d8)
        run: |
          npm install -g jsvu
          # إعداد ملف jsvukrc لتحديد النظام والمحرك
          echo '{"os": "linux64", "engines": ["v8"], "prefix": "/home/runner/.jsvu"}' > ~/.jsvukrc
          jsvu --engine=v8
          # إضافة المسار لبيئة التشغيل
          echo "/home/runner/.jsvu/bin" >> $GITHUB_PATH

      # 2. تشغيل الـ PoC مع التأكد من المسار
      - name: Execute PoC Comparison
        run: |
          # تعريف المسار محلياً للتأكيد في هذه الخطوة
          export PATH="/home/runner/.jsvu/bin:$PATH"
          
          # التحقق من أن v8 يعمل
          if ! command -v v8 &> /dev/null; then
            echo "Error: v8 not found in PATH"
            ls -R /home/runner/.jsvu/bin
            exit 1
          fi

          echo "Running Baseline (Jitless)..."
          v8 --jitless poc_vuln06_trigger.js > baseline.txt
          
          echo "Running Maglev (Trigger)..."
          # تفعيل Maglev وتطبيق الفلتر لمحاكاة الثغرة في FoldBranch
          v8 --maglev --maglev-filter=* poc_vuln06_trigger.js > maglev.txt
          
          echo "Comparing Outputs..."
          if diff baseline.txt maglev.txt; then
            echo "✅ No mismatch detected."
          else
            echo "❌ MISMATCH DETECTED! JIT Logic Error Confirmed."
            diff baseline.txt maglev.txt
            exit 1
          fi

      # 3. رفع التقارير حتى في حالة الفشل لمراجعتها
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-execution-logs
          path: |
            baseline.txt
            maglev.txt
