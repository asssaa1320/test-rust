name: Solve Kitty Terminal Challenge

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:

      - name: Install tools
        run: |
          sudo apt-get install -y socat netcat-openbsd 2>/dev/null || true

      - name: Try TERM=xterm-kitty via env
        run: |
          # الـ challenge بيشوف TERM variable
          # نبعت commands مع TERM=xterm-kitty
          
          python3 - <<'EOF'
          import socket, time, os

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          def send_recv(s, cmd, wait=1.5):
              s.sendall(cmd)
              time.sleep(wait)
              data = b''
              s.settimeout(2)
              try:
                  while True:
                      chunk = s.recv(4096)
                      if not chunk: break
                      data += chunk
              except:
                  pass
              return data

          s = socket.create_connection((host, port), timeout=15)
          s.settimeout(5)
          
          # Read initial prompt
          time.sleep(2)
          init = b''
          try:
              init = s.recv(4096)
          except: pass
          print("=== Initial ===")
          print(repr(init))
          print(init.decode('utf-8', errors='replace'))

          # Try: export TERM=xterm-kitty then cat the flag
          commands = [
              b'export TERM=xterm-kitty\n',
              b'export TERM_PROGRAM=kitty\n',
              b'cat /home/ctf/flag.kitty\n',
          ]

          for cmd in commands:
              out = send_recv(s, cmd)
              print(f"\n=== After: {cmd.decode().strip()} ===")
              print(repr(out))
              print(out.decode('utf-8', errors='replace'))

          s.close()
          EOF

      - name: Try Kitty terminal escape sequences
        run: |
          python3 - <<'EOF'
          import socket, time

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          def send_recv(s, data, wait=2.0):
              s.sendall(data)
              time.sleep(wait)
              out = b''
              s.settimeout(2)
              try:
                  while True:
                      chunk = s.recv(4096)
                      if not chunk: break
                      out += chunk
              except: pass
              return out

          s = socket.create_connection((host, port), timeout=15)
          time.sleep(2)
          try: s.recv(4096)
          except: pass

          # Kitty identification via APC sequence
          # Kitty uses: ESC_Ga=q,... ESC\ for graphics protocol
          # Or DA1: ESC[c → kitty responds with: ESC[?62;c or similar
          # Or: XTGETTCAP for kitty-specific capabilities
          
          tests = [
              # Kitty keyboard protocol query
              (b'\x1b[?u', "Kitty keyboard query"),
              # Primary DA
              (b'\x1b[0c', "Primary DA"),
              # Secondary DA  
              (b'\x1b[>0c', "Secondary DA"),
              # Kitty graphics protocol - query
              (b'\x1b_Gi=1,a=q;\x1b\\', "Kitty graphics query"),
              # XTGETTCAP for kitty
              (b'\x1bP+q6B756E697432 \x1b\\', "XTGETTCAP"),
          ]

          for seq, name in tests:
              out = send_recv(s, seq, wait=1)
              print(f"\n=== {name} ===")
              print(repr(out))

          s.close()
          EOF

      - name: Read flag with TERM=xterm-kitty set before connection
        run: |
          # The server likely checks TERM env var of the shell
          # We need to set it BEFORE the shell starts
          # Use stty or pass env via the protocol
          
          python3 - <<'EOF'
          import socket, time

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          def send_recv(s, cmd, wait=2.0):
              if isinstance(cmd, str):
                  cmd = cmd.encode()
              s.sendall(cmd)
              time.sleep(wait)
              out = b''
              s.settimeout(2)
              try:
                  while True:
                      chunk = s.recv(4096)
                      if not chunk: break
                      out += chunk
              except: pass
              return out

          s = socket.create_connection((host, port), timeout=15)
          time.sleep(2)
          try:
              banner = s.recv(4096)
              print("Banner:", banner.decode('utf-8', errors='replace'))
          except: pass

          # Try various ways to set TERM
          attempts = [
              # Direct cat with TERM set
              'TERM=xterm-kitty cat /home/ctf/flag.kitty\n',
              # env command
              'env TERM=xterm-kitty cat /home/ctf/flag.kitty\n',
              # Check what file does
              'file /home/ctf/flag.kitty\n',
              # ls to see what's there
              'ls -la /home/ctf/\n',
              # Check if it's a script that checks TERM
              'cat /home/ctf/flag.kitty\n',
              # Check TERM variable
              'echo TERM=$TERM\n',
              # Check if there are other files
              'ls -la /home/ctf/flag*\n',
              # Try reading directly
              'xxd /home/ctf/flag.kitty | head -20\n',
              # Check file type
              'file /home/ctf/flag.kitty\n',
          ]

          for cmd in attempts:
              out = send_recv(s, cmd)
              print(f"\n$ {cmd.strip()}")
              print(out.decode('utf-8', errors='replace'))

          s.close()
          EOF

      - name: Send Kitty terminal ID in TERMINFO
        run: |
          # Maybe the challenge uses terminfo or checks terminal capabilities
          # Kitty has unique terminfo: xterm-kitty
          # Let's try sending the Kitty terminal response to queries
          
          python3 - <<'EOF'
          import socket, time

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port = 8024

          s = socket.create_connection((host, port), timeout=15)
          time.sleep(2)
          try: s.recv(4096)
          except: pass

          def send_recv(s, data, wait=2.0):
              if isinstance(data, str): data = data.encode()
              s.sendall(data)
              time.sleep(wait)
              out = b''
              s.settimeout(2)
              try:
                  while True:
                      chunk = s.recv(4096)
                      if not chunk: break
                      out += chunk
              except: pass
              return out

          # Kitty terminal responds to DA2 (Secondary Device Attributes) with:
          # ESC[>1;4000;29c  (kitty version)
          # So: server sends ESC[>c, we respond with kitty's response

          # But actually: the SERVER checks OUR terminal type
          # via TERM variable or by querying us
          # 
          # Sequence: server sends ESC[>c query → we respond as kitty
          # ESC [ > 1 ; <version> ; 29 c

          # First read what server sends us
          time.sleep(1)
          try:
              data = s.recv(4096)
              print("Server sent:", repr(data))
          except: pass

          # Respond as Kitty terminal to DA2 query
          # Kitty DA2 response: ESC [ > 1 ; 4000 ; 29 c
          kitty_da2 = b'\x1b[>1;4000;29c'
          
          # Also try: set TERM via inline env
          cmds = [
              b'TERM=xterm-kitty bash -c "cat /home/ctf/flag.kitty"\n',
              b'TERM=xterm-kitty sh -c "cat /home/ctf/flag.kitty"\n',
          ]
          
          for cmd in cmds:
              out = send_recv(s, cmd)
              print(f"\nCmd: {cmd.decode().strip()}")
              print(out.decode('utf-8', errors='replace'))

          s.close()
          EOF
