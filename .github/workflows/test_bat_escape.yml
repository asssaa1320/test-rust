name: Solve wromwarp CTF

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  solve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libncurses-dev socat python3 expect

      - name: Download and extract challenge files
        run: |
          # إذا كانت الملفات موجودة في الريبو استخدمها مباشرة
          # وإلا يمكن تحميلها هنا
          ls les_dist/ || true

      - name: Build the emulator locally
        run: |
          cd les_dist
          gcc -o wromwarp -O0 -Wall -Wextra wromwarp.c -lncurses -ltinfo
          echo "Build successful"

      - name: Create a custom WRAM reader (bypass emulator UI)
        run: |
          cat > read_flag.c << 'EOF'
          #include <stdio.h>
          #include <stdint.h>
          #include <string.h>

          int main(void) {
              FILE *f = fopen("les_dist/WRAM.bin", "rb");
              if (!f) {
                  fprintf(stderr, "Cannot open WRAM.bin\n");
                  return 1;
              }
              uint8_t ram[256];
              memset(ram, 0, sizeof(ram));
              fread(ram, 1, 256, f);
              fclose(f);

              printf("Flag at 0xF0: ");
              for (int i = 0xF0; i < 256 && ram[i] != 0; i++) {
                  printf("%c", ram[i]);
              }
              printf("\n");

              printf("Hex dump at 0xF0: ");
              for (int i = 0xF0; i < 256; i++) {
                  printf("%02x ", ram[i]);
              }
              printf("\n");
              return 0;
          }
          EOF
          gcc -o read_flag read_flag.c
          echo "Local WRAM.bin content (placeholder):"
          ./read_flag

      - name: Connect to remote server and get real flag
        run: |
          cat > solve_remote.py << 'PYEOF'
          import socket
          import time
          import sys

          HOST = "wromwarp-0f7f87c9.challenges.bsidessf.net"
          PORT = 6502

          def recv_all(sock, timeout=3):
              sock.settimeout(timeout)
              data = b""
              try:
                  while True:
                      chunk = sock.recv(4096)
                      if not chunk:
                          break
                      data += chunk
              except socket.timeout:
                  pass
              return data

          def send_cmd(sock, cmd):
              time.sleep(0.5)
              sock.sendall((cmd + "\n").encode())
              time.sleep(1)
              return recv_all(sock)

          print(f"Connecting to {HOST}:{PORT}...")
          try:
              sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              sock.connect((HOST, PORT))
              print("Connected!")

              # Wait for initial screen / logo
              time.sleep(4)
              initial = recv_all(sock, timeout=2)
              print("Initial data received:", len(initial), "bytes")

              # Load the printflag ROM
              print("Loading printflag.les...")
              r1 = send_cmd(sock, "/load printflag.les")
              print("After /load:", r1[:200] if r1 else "(empty)")

              # Run the program
              print("Running program...")
              r2 = send_cmd(sock, "/run")
              print("After /run:", r2[:500] if r2 else "(empty)")

              # Collect all output
              time.sleep(2)
              r3 = recv_all(sock, timeout=3)
              
              all_output = initial + r1 + r2 + r3
              print("\n=== Full raw output ===")
              # Print printable chars and look for flag pattern
              text = all_output.decode("latin-1", errors="replace")
              
              # Search for CTF flag patterns
              import re
              # Common flag formats: CTF{...}, FLAG{...}, BSides{...}, etc.
              patterns = [
                  r'[A-Z]{2,10}\{[^\}]{5,50}\}',
                  r'flag\{[^\}]+\}',
              ]
              found = False
              for pat in patterns:
                  matches = re.findall(pat, text, re.IGNORECASE)
                  if matches:
                      print(f"\n>>> FLAG FOUND: {matches}")
                      found = True

              if not found:
                  print("\nNo flag pattern found. Dumping last 1000 chars of output:")
                  # Strip ANSI escape codes for readability
                  clean = re.sub(r'\x1b\[[0-9;]*[mABCDHJKlh]', '', text)
                  clean = re.sub(r'[^\x20-\x7e\n]', '.', clean)
                  print(clean[-1000:])

              sock.close()

          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          PYEOF
          python3 solve_remote.py

      - name: Alternative - use expect to interact with socat
        if: always()
        run: |
          cat > solve.expect << 'EOF'
          #!/usr/bin/expect -f
          set timeout 30

          spawn socat STDIO TCP:wromwarp-0f7f87c9.challenges.bsidessf.net:6502

          # Wait for the UI to initialize (logo + ncurses)
          sleep 5

          # Send /load command
          send "/load printflag.les\r"
          sleep 2

          # Send /run command  
          send "/run\r"
          sleep 3

          # Capture output
          expect {
              timeout { puts "Timeout waiting for output" }
              eof     { puts "Connection closed" }
          }

          # Print everything received
          puts "\nDone."
          EOF
          chmod +x solve.expect
          expect solve.expect 2>&1 | cat || true
