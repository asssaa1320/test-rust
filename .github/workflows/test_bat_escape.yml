name: 🚀 Fully Automated SSR Fuzzer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # تشغيل تلقائي كل يوم الساعة 12 بالليل للفحص الدوري
  workflow_dispatch: # للسماح لك بتشغيله يدوياً في أي وقت

jobs:
  fuzzing:
    name: Automated Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install & Build SSR
        run: |
          npm ci
          # بنجرب نبني الـ SSR، ولو مفيش Script بناء بنكمل عادي
          npm run build:ssr --if-present

      - name: ⚡ Start SSR Server & Wait
        run: |
          # تشغيل السيرفر في الخلفية
          npm run serve:ssr & 
          
          # انتظر حتى يستجيب السيرفر (Health Check) لمدة أقصاها 60 ثانية
          echo "⏳ Waiting for SSR server to initialize..."
          timeout 60s bash -c 'until curl -s localhost:4000; do sleep 2; done'
          echo "✅ Server is UP and running!"

      - name: 🛡️ Execute Auto-Fuzzer
        id: fuzzer_step
        run: |
          # تشغيل السكريبت اللي بيعمل Discover للـ Routes ويضربها
          node ssr-fuzzer.js http://localhost:4000 --output=audit-log.json

      - name: 📊 Generate Summary Report
        if: always()
        run: |
          echo "## 🛡️ SSR Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "Scanned at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f audit-log.json ]; then
            # استخراج عدد الكراشات والـ 500 باستخدام jq
            TOTAL=$(jq '. | length' audit-log.json)
            CRITICALS=$(jq '[.[] | select(.severity=="CRITICAL")] | length' audit-log.json)
            
            echo "| Metric | Result |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🎯 Total Payloads | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 💀 Critical Failures | $CRITICALS |" >> $GITHUB_STEP_SUMMARY
            
            if [ "$CRITICALS" -gt "0" ]; then
              echo "### ⚠️ Vulnerabilities Found!" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | select(.severity=="CRITICAL") | "- 🔴 **Crash** on Path: `\(.route)\(.payload)`"' audit-log.json >> $GITHUB_STEP_SUMMARY
              exit 1 # تفشيل الـ Build لو فيه ثغرة خطيرة
            else
              echo "### ✅ No Critical Vulnerabilities Detected." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Error: Audit log was not generated." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📂 Archive Detailed Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-security-report
          path: audit-log.json
