name: Solve Kitty - dd chunks

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - name: Install Pillow
        run: pip install pillow --break-system-packages -q

      - name: Download flag.kitty in chunks via dd+base64
        run: |
          python3 - <<'EOF'
          import socket, time, base64, re

          host = "kitty-7c6c7969.challenges.bsidessf.net"
          port  = 8024
          CHUNK = 20000   # bytes per dd chunk
          FSIZE = 759436

          def connect():
              s = socket.create_connection((host, port), timeout=60)
              time.sleep(2)
              _drain(s, 4)
              return s

          def _drain(s, timeout=3):
              s.settimeout(timeout)
              buf = b''
              try:
                  while True:
                      c = s.recv(65536)
                      if not c: break
                      buf += c
              except: pass
              return buf

          def run(s, cmd, wait=8):
              s.sendall(cmd.encode() + b'\n')
              time.sleep(wait)
              return _drain(s, timeout=4).decode(errors='replace')

          def extract_b64(text):
              """Pull the longest base64-only token from shell output."""
              best = ''
              for line in text.replace('\r','').split('\n'):
                  line = re.sub(r'\x1b\[[^A-Za-z]*[A-Za-z]', '', line).strip()
                  if re.fullmatch(r'[A-Za-z0-9+/=]+', line) and len(line) > len(best):
                      best = line
              return best

          num_chunks = (FSIZE + CHUNK - 1) // CHUNK
          all_bytes  = b''

          s = connect()

          # quick sanity: check base64 exists
          out = run(s, 'which base64', wait=2)
          print("base64 at:", out.strip().split('\n')[-1])

          for i in range(num_chunks):
              skip = i * CHUNK
              cmd  = f'dd if=/home/ctf/flag.kitty bs=1 skip={skip} count={CHUNK} 2>/dev/null | base64 -w0'
              out  = run(s, cmd, wait=12)
              b64  = extract_b64(out)
              if b64:
                  chunk_bytes = base64.b64decode(b64 + '==')
                  all_bytes  += chunk_bytes
                  print(f"chunk {i+1:2d}/{num_chunks}: {len(chunk_bytes):6d} B  total={len(all_bytes):7d}")
              else:
                  print(f"chunk {i+1:2d}/{num_chunks}: EMPTY  raw={repr(out[:120])}")

          s.close()
          print(f"\nFinal size: {len(all_bytes)} / {FSIZE}")

          with open('/tmp/flag.kitty', 'wb') as f:
              f.write(all_bytes)
          EOF

      - name: Parse Kitty protocol and render PNG
        run: |
          python3 - <<'EOF'
          import base64, zlib, re
          from PIL import Image

          raw = open('/tmp/flag.kitty', 'rb').read()
          print(f"File: {len(raw)} bytes")
          print(f"First 200: {repr(raw[:200])}")

          text = raw.decode('utf-8', errors='replace')

          # Kitty APC: ESC _ G <params> ; <data> ESC \
          # Or stripped (TERM=dumb): _G<params>;<data>
          # Collect ALL base64 payloads across chunks (m=1 = more, m=0 = last)
          chunks = re.findall(r'_G([^;\x00-\x1f]+);([A-Za-z0-9+/=]+)', text)
          print(f"Protocol chunks: {len(chunks)}")

          width = height = fmt = 0
          comp  = None
          b64   = ''

          for params_str, data in chunks:
              p = dict(kv.split('=',1) for kv in params_str.split(',') if '=' in kv)
              if 's' in p: width  = int(p['s'])
              if 'v' in p: height = int(p['v'])
              if 'f' in p: fmt    = int(p['f'])
              if 'o' in p: comp   = p['o']
              b64 += data

          print(f"Image {width}x{height} fmt={fmt} comp={comp} b64={len(b64)}")

          raw_b64 = base64.b64decode(b64 + '==')
          print(f"Decoded: {len(raw_b64)} B")

          img_data = zlib.decompress(raw_b64) if comp == 'z' else raw_b64
          print(f"Pixels:  {len(img_data)} B  (need {width*height*3})")

          mode = 'RGBA' if fmt == 32 else 'RGB'
          bpp  = 4      if fmt == 32 else 3
          img  = Image.frombytes(mode, (width, height), img_data[:width*height*bpp])
          img.save('/tmp/flag_image.png')
          print("Saved /tmp/flag_image.png")
          EOF

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kitty-flag
          path: /tmp/flag_image.png
