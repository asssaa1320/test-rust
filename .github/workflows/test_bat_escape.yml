name: Security Bug Verification

on: [push, workflow_dispatch]

jobs:
  verify-bugs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup test module
        run: |
          mkdir -p ~/hiero-test
          cd ~/hiero-test
          go mod init hiero-security-test
          go get github.com/hiero-ledger/hiero-sdk-go/v2@latest

      - name: Bug 2 — ClientFromConfigWithoutScheduleNetworkUpdate NPE
        run: |
          mkdir -p ~/hiero-test/bug2
          cat > ~/hiero-test/bug2/main_test.go << 'EOF'
          package bug2_test

          import (
            "testing"
            hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
          )

          func TestBug2_NilPointerPanic(t *testing.T) {
            defer func() {
              if r := recover(); r != nil {
                t.Logf("BUG CONFIRMED — panic: %v", r)
              } else {
                t.Log("No panic — possibly fixed")
              }
            }()
            badJSON := []byte(`{"network":"mainnet","mirrorNetwork":123}`)
            client, err := hiero.ClientFromConfigWithoutScheduleNetworkUpdate(badJSON)
            t.Logf("client=%v err=%v", client, err)
          }
          EOF
          cd ~/hiero-test && go test ./bug2/ -v -run TestBug2

      - name: Bug 1 — SetNetworkUpdatePeriod(0) CPU loop
        run: |
          mkdir -p ~/hiero-test/bug1
          cat > ~/hiero-test/bug1/main_test.go << 'EOF'
          package bug1_test

          import (
            "runtime"
            "testing"
            "time"
            hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
          )

          func TestBug1_ZeroPeriodLoop(t *testing.T) {
            client := hiero.ClientForTestnet()
            defer client.Close()

            // قياس CPU قبل
            var before, after runtime.MemStats
            runtime.ReadMemStats(&before)
            numGoroutinesBefore := runtime.NumGoroutine()

            client.SetNetworkUpdatePeriod(0)
            time.Sleep(500 * time.Millisecond)

            numGoroutinesAfter := runtime.NumGoroutine()
            runtime.ReadMemStats(&after)

            t.Logf("Goroutines before: %d", numGoroutinesBefore)
            t.Logf("Goroutines after:  %d", numGoroutinesAfter)
            t.Logf("Heap alloc delta:  %d bytes", after.HeapAlloc-before.HeapAlloc)

            if numGoroutinesAfter > numGoroutinesBefore+5 {
              t.Logf("BUG CONFIRMED — goroutine spike: +%d", numGoroutinesAfter-numGoroutinesBefore)
            }
          }
          EOF
          cd ~/hiero-test && timeout 10 go test ./bug1/ -v -run TestBug1 -timeout 8s || echo "TIMEOUT — possible infinite loop"

      - name: Bug 3 — defer in retry loop
        run: |
          mkdir -p ~/hiero-test/bug3
          cat > ~/hiero-test/bug3/main_test.go << 'EOF'
          package bug3_test

          import (
            "testing"
            hiero "github.com/hiero-ledger/hiero-sdk-go/v2/sdk"
          )

          func TestBug3_DeferInLoop(t *testing.T) {
            // نتحقق من الكود مباشرة عبر source inspection
            // executable.go line: defer client._UpdateAddressBook()
            // داخل for loop → يتراكم N مرات

            client := hiero.ClientForTestnet()
            defer client.Close()

            // نُشغِّل transaction لـ invalid node account → INVALID_NODE_ACCOUNT
            _, err := hiero.NewAccountBalanceQuery().
              SetAccountID(hiero.AccountID{Account: 999999999}).
              SetNodeAccountIDs([]hiero.AccountID{{Account: 99}}).
              SetMaxRetry(3).
              Execute(client)

            t.Logf("err: %v", err)
            t.Log("Check: how many UpdateAddressBook calls happened after _Execute returned")
          }
          EOF
          cd ~/hiero-test && go test ./bug3/ -v -run TestBug3 -timeout 30s
